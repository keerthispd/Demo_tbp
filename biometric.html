<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biometric Verification</title>
  <style>
    :root {
      --bg: #051520;
      --panel: rgba(10, 28, 40, 0.9);
      --panel-border: rgba(94, 234, 212, 0.18);
      --ink: #e8f1f8;
      --muted: #9cb6c7;
      --accent: #5eead4;
      --accent-2: #38bdf8;
      --danger: #fda4af;
      --danger-bg: rgba(190, 24, 93, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(94, 234, 212, 0.2), transparent 34%),
        linear-gradient(160deg, #03111c, #091b2a 58%, #04131e);
    }

    .panel {
      width: min(620px, 100%);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
      padding: 28px;
      backdrop-filter: blur(14px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(94, 234, 212, 0.22);
      color: var(--accent);
      background: rgba(7, 25, 38, 0.4);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(1.8rem, 4.2vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .status {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .status.show { display: block; }
    .status.error { background: var(--danger-bg); color: var(--danger); }

    button,
    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 12px;
      text-decoration: none;
      font: inherit;
      font-weight: 700;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button {
      border: 0;
      color: #02131f;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }

    button:hover,
    .link:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* option cards */
    .option-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin-top:12px }
    .option-card { background: rgba(255,255,255,0.03); border:1px solid rgba(166,180,194,0.08); padding:12px; border-radius:12px; cursor:pointer; display:flex; gap:12px; align-items:center }
    .option-card .icon { width:48px; height:48px; display:inline-flex; align-items:center; justify-content:center; color:var(--accent-2); }
    .option-card h3 { margin:0; font-size:1rem }
    .option-card .meta { color:var(--muted); font-size:0.9rem }
    .option-card.primary { border-color: rgba(94,234,212,0.5); box-shadow:0 8px 22px rgba(56,189,248,0.06) }

    .link {
      border: 1px solid rgba(156, 182, 199, 0.22);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.03);
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="eyebrow">Phase 2 security</div>
    <h1>Verify biometrics to unlock your vault.</h1>
    <p>Password verification is complete. Approve with your fingerprint, face ID, or device biometric prompt to continue.</p>

    <div id="status" class="status"></div>

    <div class="actions">
      <button id="verifyBtn" type="button">Verify with biometrics</button>
      <a class="link" href="/login.html">Back to login</a>
    </div>
  </main>

  <script>
    function base64urlToBuffer(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/");
      const padded = base64 + "=".repeat((4 - (base64.length % 4)) % 4);
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function bufferToBase64url(input) {
      const bytes = input instanceof Uint8Array ? input : new Uint8Array(input);
      let binary = "";
      for (const b of bytes) {
        binary += String.fromCharCode(b);
      }
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function showError(message) {
      status.textContent = message;
      status.className = "status show error";
    }

    async function beginBiometricVerification(options) {
      if (!(window.PublicKeyCredential && navigator.credentials && navigator.credentials.get)) {
        throw new Error("This browser or device does not support biometric passkeys.");
      }

      options.challenge = base64urlToBuffer(options.challenge);
      if (Array.isArray(options.allowCredentials)) {
        options.allowCredentials = options.allowCredentials.map((item) => ({
          ...item,
          id: base64urlToBuffer(item.id),
        }));
      }

      const assertion = await navigator.credentials.get({ publicKey: options });
      if (!assertion) {
        throw new Error("Biometric verification was cancelled.");
      }

      const credential = {
        id: assertion.id,
        rawId: bufferToBase64url(assertion.rawId),
        type: assertion.type,
        response: {
          authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
          clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
          signature: bufferToBase64url(assertion.response.signature),
          userHandle: assertion.response.userHandle
            ? bufferToBase64url(assertion.response.userHandle)
            : null,
        },
        clientExtensionResults: assertion.getClientExtensionResults(),
        authenticatorAttachment: assertion.authenticatorAttachment || "platform",
      };

      const verifyResponse = await fetch("/api/biometric/auth/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ credential }),
      });
      const verifyData = await verifyResponse.json();
      if (!verifyResponse.ok) {
        throw new Error(verifyData.error || "Biometric verification failed.");
      }

      window.location.href = verifyData.redirect || "/password.html";
    }

    async function beginPasscodeVerification(passcode) {
      const verifyResponse = await fetch('/api/biometric/auth/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passcode }),
      });
      const data = await verifyResponse.json();
      if (!verifyResponse.ok) throw new Error(data.error || 'Passcode verification failed.');
      window.location.href = data.redirect || '/password.html';
    }

    const status = document.getElementById("status");
    const verifyBtn = document.getElementById("verifyBtn");

    // On load, check options to determine available methods
    async function init() {
      try {
        const resp = await fetch('/api/biometric/auth/options', { method: 'POST' });
        const info = await resp.json();
        if (!resp.ok) throw new Error(info.error || 'Unable to start verification.');

        const container = document.querySelector('.actions');
        container.innerHTML = '';

        if (info.webauthn || info.passcode) {
          const grid = document.createElement('div');
          grid.className = 'option-grid';

          if (info.webauthn) {
            const card = document.createElement('div');
            card.className = 'option-card primary';
            card.innerHTML = `<div class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 10a5 5 0 11-9.9 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 7l7 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div style="flex:1"><h3>Device biometric (passkey)</h3><div class="meta">Use fingerprint or face on this device for fast unlock.</div></div>`;
            card.addEventListener('click', async () => {
              card.querySelector('h3').textContent = 'Waiting…';
              try { await beginBiometricVerification(info); } catch (e) { showError(e.message); card.querySelector('h3').textContent = 'Device biometric (passkey)'; }
            });
            grid.appendChild(card);
          }

          if (info.passcode) {
            const card2 = document.createElement('div');
            card2.className = 'option-card';
            card2.innerHTML = `<div class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M8 10V7a4 4 0 118 0v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div style="flex:1"><h3>Use numeric passcode</h3><div class="meta">Fallback when biometrics aren't available. Enter a local passcode.</div></div>`;
            card2.addEventListener('click', () => renderPasscodeForm());
            grid.appendChild(card2);
          }

          const back = document.createElement('a'); back.href='/login.html'; back.className='link'; back.textContent='Back to login';
          container.appendChild(grid);
          container.appendChild(back);
          return;
        }

      } catch (e) {
        showError(e.message || 'Unable to initialize verification.');
      }
    }

    function renderPasscodeForm() {
      const container = document.querySelector('.actions');
      container.innerHTML = '';
      const input = document.createElement('input');
      input.type = 'password';
      input.placeholder = 'Enter your passcode';
      input.style.padding = '10px'; input.style.borderRadius='8px'; input.style.border='1px solid rgba(166,180,194,0.12)'; input.style.width='100%';
      const submit = document.createElement('button');
      submit.textContent = 'Verify passcode';
      submit.addEventListener('click', async () => {
        submit.disabled = true; submit.textContent = 'Verifying...';
        try { await beginPasscodeVerification(input.value); } catch (e) { showError(e.message); submit.disabled=false; submit.textContent='Verify passcode'; }
      });
      const back = document.createElement('a'); back.href='/login.html'; back.className='link'; back.textContent='Back to login';
      container.appendChild(input); container.appendChild(submit); container.appendChild(back);
    }

    init();
  </script>
</body>
</html>
