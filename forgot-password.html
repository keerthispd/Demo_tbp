<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Forgot Password</title>
  <style>
    :root {
      --bg: #061826;
      --panel: rgba(11, 30, 45, 0.9);
      --panel-border: rgba(120, 198, 255, 0.15);
      --ink: #e8f1f8;
      --muted: #9cb6c7;
      --accent: #5eead4;
      --accent-2: #38bdf8;
      --danger: #fda4af;
      --danger-bg: rgba(190, 24, 93, 0.18);
      --ok: #86efac;
      --ok-bg: rgba(22, 101, 52, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.25), transparent 28%),
        radial-gradient(circle at bottom right, rgba(94, 234, 212, 0.18), transparent 30%),
        linear-gradient(160deg, #03111c, #091b2a 58%, #04131e);
    }

    .panel {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
      padding: 28px;
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4.2vw, 2.8rem);
      line-height: 1.06;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.55;
    }

    .status {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .status.show { display: block; }
    .status.error { background: var(--danger-bg); color: var(--danger); }
    .status.ok { background: var(--ok-bg); color: var(--ok); }

    .meta {
      margin: 10px 0 0;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(156, 182, 199, 0.18);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .meta strong { color: var(--ink); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
      font-size: 0.94rem;
    }

    input {
      width: 100%;
      border: 1px solid rgba(156, 182, 199, 0.28);
      border-radius: 12px;
      padding: 12px 13px;
      background: rgba(2, 12, 20, 0.45);
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: rgba(94, 234, 212, 0.8);
      box-shadow: 0 0 0 4px rgba(94, 234, 212, 0.14);
    }

    .method {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .method button {
      width: 100%;
      border: 1px solid rgba(156, 182, 199, 0.25);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ink);
      border-radius: 12px;
      min-height: 44px;
      font-weight: 700;
      cursor: pointer;
    }

    .method button.active {
      border-color: rgba(94, 234, 212, 0.65);
      box-shadow: 0 10px 24px rgba(56, 189, 248, 0.08);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button.primary,
    a.link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 15px;
      border-radius: 10px;
      text-decoration: none;
      font: inherit;
      font-weight: 700;
    }

    button.primary {
      border: 0;
      color: #02131f;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
    }

    a.link {
      border: 1px solid rgba(156, 182, 199, 0.22);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.03);
    }

    .hidden { display: none; }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .method { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Recover your password</h1>
    <p>Recovery is allowed only before the 24-hour lock is active. Verify with your alternate method and answer your backup question.</p>

    <div id="status" class="status"></div>
    <div id="recoveryMeta" class="meta">Load recovery options to see the backup question and verify your alternate factor.</div>

    <div class="field">
      <label for="userid">User ID</label>
      <input id="userid" name="userid" type="text" minlength="3" maxlength="40" required />
    </div>

    <div class="actions">
      <button id="loadBtn" class="primary" type="button">Load recovery options</button>
      <a class="link" href="/login.html">Back to login</a>
    </div>

    <section id="recoverySection" class="hidden" style="margin-top:18px;">
      <div class="field">
        <label>Choose alternate verification</label>
        <div class="method">
          <button id="useBiometricBtn" type="button">Use biometric</button>
          <button id="usePasscodeBtn" type="button">Use PIN passcode</button>
        </div>
      </div>

      <div id="passcodeWrap" class="field hidden">
        <label for="passcode">PIN passcode</label>
        <input id="passcode" type="password" minlength="4" maxlength="32" />
      </div>

      <div class="field">
        <label id="backupQuestionLabel" for="backup_answer">Backup question</label>
        <input id="backup_answer" type="password" minlength="2" maxlength="128" required />
      </div>

      <div class="grid">
        <div class="field">
          <label for="new_password">New password</label>
          <input id="new_password" type="password" minlength="6" maxlength="128" required />
        </div>
        <div class="field">
          <label for="confirm_password">Confirm new password</label>
          <input id="confirm_password" type="password" minlength="6" maxlength="128" required />
        </div>
      </div>

      <div class="actions">
        <button id="resetBtn" class="primary" type="button">Reset password</button>
      </div>
    </section>
  </main>

  <script>
    function base64urlToBuffer(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/");
      const padded = base64 + "=".repeat((4 - (base64.length % 4)) % 4);
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function bufferToBase64url(input) {
      const bytes = input instanceof Uint8Array ? input : new Uint8Array(input);
      let binary = "";
      for (const b of bytes) {
        binary += String.fromCharCode(b);
      }
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    const status = document.getElementById("status");
    const recoveryMeta = document.getElementById("recoveryMeta");
    const userid = document.getElementById("userid");
    const loadBtn = document.getElementById("loadBtn");
    const recoverySection = document.getElementById("recoverySection");
    const useBiometricBtn = document.getElementById("useBiometricBtn");
    const usePasscodeBtn = document.getElementById("usePasscodeBtn");
    const passcodeWrap = document.getElementById("passcodeWrap");
    const passcodeInput = document.getElementById("passcode");
    const backupQuestionLabel = document.getElementById("backupQuestionLabel");
    const backupAnswerInput = document.getElementById("backup_answer");
    const newPasswordInput = document.getElementById("new_password");
    const confirmPasswordInput = document.getElementById("confirm_password");
    const resetBtn = document.getElementById("resetBtn");

    let recoveryInfo = null;
    let selectedMethod = null;
    let lockCountdownTimer = null;
    let recoveryLockedUntil = null;

    function formatDuration(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${hours}h ${minutes}m ${seconds}s`;
    }

    function stopCountdown() {
      if (lockCountdownTimer) {
        clearInterval(lockCountdownTimer);
        lockCountdownTimer = null;
      }
    }

    function renderLockCountdown() {
      if (!recoveryLockedUntil) {
        return;
      }

      const remainingMs = recoveryLockedUntil.getTime() - Date.now();
      if (remainingMs <= 0) {
        stopCountdown();
        recoveryLockedUntil = null;
        recoveryMeta.innerHTML = "Backup question recovery is unlocked again. You can try another answer.";
        return;
      }

      recoveryMeta.innerHTML = `<strong>Backup question lockout:</strong> try again in ${formatDuration(remainingMs)}.`;
    }

    function setRecoveryStateFromResponse(data) {
      if (typeof data.remaining_attempts === "number" && data.remaining_attempts > 0) {
        recoveryMeta.innerHTML = `<strong>Backup question attempts left:</strong> ${data.remaining_attempts}.`;
      }

      if (data.locked_until) {
        stopCountdown();
        recoveryLockedUntil = new Date(data.locked_until);
        renderLockCountdown();
        lockCountdownTimer = setInterval(renderLockCountdown, 1000);
      }
    }

    function showError(message) {
      status.textContent = message;
      status.className = "status show error";
    }

    function showOk(message) {
      status.textContent = message;
      status.className = "status show ok";
    }

    function clearStatus() {
      status.textContent = "";
      status.className = "status";
    }

    function setMethod(method) {
      selectedMethod = method;
      useBiometricBtn.classList.toggle("active", method === "biometric");
      usePasscodeBtn.classList.toggle("active", method === "passcode");
      passcodeWrap.classList.toggle("hidden", method !== "passcode");
    }

    async function verifyBiometricForRecovery() {
      const optionsResp = await fetch("/api/forgot/biometric/options", { method: "POST" });
      const options = await optionsResp.json();
      if (!optionsResp.ok) {
        throw new Error(options.error || "Unable to start biometric recovery.");
      }

      if (!(window.PublicKeyCredential && navigator.credentials && navigator.credentials.get)) {
        throw new Error("This browser or device does not support biometric passkeys.");
      }

      options.challenge = base64urlToBuffer(options.challenge);
      if (Array.isArray(options.allowCredentials)) {
        options.allowCredentials = options.allowCredentials.map((item) => ({
          ...item,
          id: base64urlToBuffer(item.id),
        }));
      }

      const assertion = await navigator.credentials.get({ publicKey: options });
      if (!assertion) {
        throw new Error("Biometric verification was cancelled.");
      }

      const credential = {
        id: assertion.id,
        rawId: bufferToBase64url(assertion.rawId),
        type: assertion.type,
        response: {
          authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
          clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
          signature: bufferToBase64url(assertion.response.signature),
          userHandle: assertion.response.userHandle
            ? bufferToBase64url(assertion.response.userHandle)
            : null,
        },
        clientExtensionResults: assertion.getClientExtensionResults(),
        authenticatorAttachment: assertion.authenticatorAttachment || "platform",
      };

      const verifyResp = await fetch("/api/forgot/biometric/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ credential }),
      });
      const verifyData = await verifyResp.json();
      if (!verifyResp.ok) {
        throw new Error(verifyData.error || "Biometric verification failed.");
      }
    }

    loadBtn.addEventListener("click", async () => {
      clearStatus();
      const uid = userid.value.trim();
      if (!uid) {
        showError("User ID is required.");
        return;
      }

      loadBtn.disabled = true;
      loadBtn.textContent = "Loading...";
      try {
        const resp = await fetch("/api/forgot/context", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userid: uid }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.error || "Unable to load recovery options.");
        }

        recoveryInfo = data;
        backupQuestionLabel.textContent = `Backup question: ${data.backup_question}`;
        recoverySection.classList.remove("hidden");
        stopCountdown();
        recoveryLockedUntil = null;
        recoveryMeta.innerHTML = "Recovery loaded. Submit your alternate factor and backup answer to reset your password.";

        if (data.has_passcode) {
          setMethod("passcode");
        } else if (data.has_webauthn) {
          setMethod("biometric");
        } else {
          setMethod(null);
        }

        useBiometricBtn.disabled = !data.has_webauthn;
        usePasscodeBtn.disabled = !data.has_passcode;

        showOk("Recovery options loaded. Complete alternate verification and reset your password.");
      } catch (err) {
        showError(err.message || "Unable to load recovery options.");
      } finally {
        loadBtn.disabled = false;
        loadBtn.textContent = "Load recovery options";
      }
    });

    useBiometricBtn.addEventListener("click", () => {
      if (recoveryInfo && recoveryInfo.has_webauthn) {
        setMethod("biometric");
      }
    });

    usePasscodeBtn.addEventListener("click", () => {
      if (recoveryInfo && recoveryInfo.has_passcode) {
        setMethod("passcode");
      }
    });

    resetBtn.addEventListener("click", async () => {
      clearStatus();
      const uid = userid.value.trim();
      const backupAnswer = backupAnswerInput.value.trim();
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!uid || !recoveryInfo) {
        showError("Load recovery options first.");
        return;
      }
      if (!selectedMethod) {
        showError("Select an alternate verification method.");
        return;
      }
      if (!backupAnswer) {
        showError("Backup answer is required.");
        return;
      }
      if (!newPassword || newPassword.length < 6) {
        showError("New password must be at least 6 characters.");
        return;
      }
      if (newPassword !== confirmPassword) {
        showError("New passwords do not match.");
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = "Resetting...";
      try {
        if (selectedMethod === "biometric") {
          await verifyBiometricForRecovery();
        }

        const payload = {
          userid: uid,
          method: selectedMethod,
          passcode: selectedMethod === "passcode" ? passcodeInput.value : "",
          backup_answer: backupAnswer,
          new_password: newPassword,
          confirm_password: confirmPassword,
        };

        const resp = await fetch("/api/forgot/reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (!resp.ok) {
          setRecoveryStateFromResponse(data);
          throw new Error(data.error || "Password reset failed.");
        }

        showOk(data.message || "Password reset successful.");
        recoveryMeta.innerHTML = "Password reset complete. Return to login and sign in with your new password.";
        stopCountdown();
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 1200);
      } catch (err) {
        showError(err.message || "Password reset failed.");
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = "Reset password";
      }
    });
  </script>
</body>
</html>
