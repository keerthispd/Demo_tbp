<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Enter Account Password</title>
  <style>
    body{font-family:Segoe UI,Arial;margin:40px;background:#07111d;color:#eff6ff}
    .card{max-width:520px;margin:0 auto;padding:24px;background:rgba(11,20,34,0.9);border-radius:12px}
    input{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(166,180,194,0.12);margin-bottom:12px}
    button{padding:12px 16px;border-radius:8px;background:linear-gradient(135deg,#6ee7b7,#38bdf8);border:0;color:#02131f;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <h2>Confirm your account password</h2>
    <p>Please enter your account password to complete sign in.</p>
    <form action="/complete_login" method="POST">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" minlength="6" maxlength="128" required />
      <button type="submit">Complete sign in</button>
    </form>
  </div>
</body>
</html>
