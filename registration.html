<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>CryptoSafe Registration</title>
	<style>
		:root {
			--bg: #f4f7fb;
			--panel: #ffffff;
			--ink: #172033;
			--accent: #0f766e;
			--danger: #b42318;
			--ring: rgba(15, 118, 110, 0.18);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
			background:
				radial-gradient(circle at 10% 20%, rgba(153, 246, 228, 0.40), transparent 35%),
				radial-gradient(circle at 90% 80%, rgba(15, 118, 110, 0.16), transparent 30%),
				var(--bg);
			color: var(--ink);
			display: grid;
			place-items: center;
			padding: 20px;
		}

		.card {
			width: 100%;
			max-width: 460px;
			background: var(--panel);
			border: 1px solid rgba(15, 118, 110, 0.12);
			border-radius: 18px;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
			padding: 28px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 1.8rem;
			letter-spacing: 0.02em;
		}

		p {
			margin: 0 0 20px;
			color: #40566f;
		}

		label {
			display: block;
			margin-bottom: 7px;
			font-weight: 700;
			font-size: 0.93rem;
		}

		.field {
			margin-bottom: 15px;
		}

		input {
			width: 100%;
			border: 1px solid #cbd5e1;
			border-radius: 10px;
			padding: 12px 13px;
			font: inherit;
			color: var(--ink);
			background: #ffffff;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
		}

		input:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 4px var(--ring);
		}

		button {
			width: 100%;
			border: 0;
			border-radius: 10px;
			padding: 12px 14px;
			font: inherit;
			font-weight: 700;
			color: #ffffff;
			background: linear-gradient(135deg, var(--accent), #0a9396);
			cursor: pointer;
			transition: transform 0.15s ease, filter 0.15s ease;
		}

		button:hover {
			filter: brightness(1.05);
			transform: translateY(-1px);
		}

		.note {
			margin-top: 14px;
			font-size: 0.85rem;
			color: #556b83;
		}

		.status {
			display: none;
			padding: 12px 14px;
			border-radius: 12px;
			margin-bottom: 16px;
			font-size: 0.95rem;
			line-height: 1.45;
		}

		.status.show {
			display: block;
		}

		.status.error {
			background: #fef3f2;
			color: var(--danger);
			border: 1px solid rgba(180, 35, 24, 0.16);
		}

		.links {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			margin-top: 14px;
		}

		.links a {
			text-decoration: none;
			font-weight: 700;
			color: var(--accent);
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Create Your CryptoSafe Account</h1>
		<p>Register with a unique user ID and password.</p>
		<div id="status" class="status"></div>

		<form action="/register" method="POST">
			<div class="field">
				<label for="userid">User ID</label>
				<input id="userid" name="userid" type="text" minlength="3" maxlength="40" required />
			</div>

			<div class="field">
				<label for="password">Password</label>
				<input id="password" name="password" type="password" minlength="6" maxlength="128" required />
			</div>

			<div class="field">
				<label for="confirm_password">Confirm Password</label>
				<input id="confirm_password" name="confirm_password" type="password" minlength="6" maxlength="128" required />
			</div>

			<button type="submit">Create Account</button>
			<p class="note">Passwords must match before the account is created. Passwords are securely hashed before being stored in the database.</p>
			<div class="links">
				<a href="/login.html">Already have an account? Login</a>
			</div>
		</form>
	</main>

	<script>
		const params = new URLSearchParams(window.location.search);
		const error = params.get("error");
		const status = document.getElementById("status");

		if (error) {
			status.textContent = error;
			status.className = "status show error";
		}
	</script>
</body>
</html>
